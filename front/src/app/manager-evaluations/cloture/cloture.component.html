<app-user-profile-card></app-user-profile-card>
<div [hidden]="!user">
<div [hidden]="showRemarque ">
        
        <form class="mt-5">
            <div>
        
                    <div>
                        <div class="mt-3 border border-light rounded">
                            <div class="form-group">
                                <label>
                                    <i class="fas fa-align-justify"> Remarque</i>
                                </label>
                                <textarea class="form-control" placeholder="Saisir vos remarques ici ..."></textarea>
        
                                <br>
                            </div>
                        </div>
                    </div>
            </div>
        
        </form>
        <div>
                        <button mat-button matStepperPrevious>Retour</button>
                        <button mat-button matStepperNext id="next2" (click)="cloturer()">Cloturer</button>
                      </div>
        </div>
        


              <div [hidden]="!showRemarque && objectifList">

                                        <table>
                                                <th>Num.</th>
                                                <th>Designation</th>
                                                <th>Remarque</th>

                                                <tr *ngFor = "let obj of objectifList;let i = index">
                                                <td>{{i}}</td>
                                                <td>{{obj.designation}}</td>
                                                <td>                        
                                                        <textarea class="form-control" placeholder="Saisir vos remarques ici ..." rows="1" value={{obj.remarque}} [(ngModel)]="obj.remarque"></textarea>
                                                </td>
                                                </tr>
                                        </table>
<br>
<div class="alert alert-success alert-dismissible fade show col-12" role="alert" *ngIf="success">
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
        </button>
        <span id="success2">
                <strong>
                        <i class="fas fa-thumbs-up"> Les objectifs sont ajoutés avec success !</i>
                </strong>
        </span>
</div>
                                        <button type="button" (click)="onSubmit()" class="btn btn-success mx-auto d-block mt-2" id="submit2">
                                                <i class="feather icon-check-circle"></i>Valider</button>
                                        </div>
</div>
