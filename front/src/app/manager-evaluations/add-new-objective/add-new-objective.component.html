<div *ngIf="!user;else other" class="mt-3">
        <div class="alert alert-warning" role="alert">
                Vous n'avez pas choisie un Collobaorateur !
        </div>
</div>
<ng-template #other>
<div class="row col-lg-12 mt-3 border border-dark rounded">

    <div class="mt-3 col-lg-12">
        <i class="fas fa-bars"> Informations génerales sur le Collaborateur :</i>
    </div>

    <div class="row col-lg-12 mt-3">
        <div class="col-xl-3">
            <div class="form-group">
                <label>
                    <i class="fas fa-user"> Fullname :</i>
                </label>
            </div>
        </div>
        <div class="col-xl-3">
            <div class="form-group">
                <u class="text-capitalize">{{user.fullname}}</u>
            </div>
        </div>
        <div class="col-xl-3">
            <div class="form-group">
                <label>
                    <i class="fas fa-at"> Email : </i>
                </label>
            </div>
        </div>
        <div class="col-xl-3">
            <div class="form-group">
                <u class="text-capitalize">{{user.email}}</u>
            </div>
        </div>
        <div class="col-xl-3">
            <div class="form-group">
                <label>
                    <i class="fas fa-briefcase"> Fonction : </i>
                </label>
            </div>
        </div>
        <div class="col-xl-3">
            <div class="form-group">
                <u class="text-capitalize">{{user.fonction.libelle}}</u>
            </div>
        </div>
        <div class="col-xl-3">
            <div class="form-group">
                <label>
                    <i class="fas fa-calendar-alt"> Date Intégration :</i>
                </label>
            </div>
        </div>
        <div class="col-xl-3">
            <div class="form-group">
                <u class="text-capitalize">{{user.date_integration}}</u>
            </div>
        </div>
        <div class="col-xl-3">
            <div class="form-group">
                <label>
                    <i class="fas fa-id-card"> Matricule :</i>
                </label>
            </div>
        </div>
        <div class="col-xl-3">
            <div class="form-group">
                <u class="text-capitalize">{{user.matricule}}</u>
            </div>
        </div>
    </div>

    <br>
    <br>



</div>


<form class="mt-5">
    <div>

            <div *ngFor="let objectif of newObjectifList; let i=index">
                <div class="mt-3 border border-light rounded">
                    <div class="form-group">
                        <label>
                            <i class="fas fa-align-justify"> Objectif #{{ i + 1 }}</i>
                        </label>
                        <textarea class="form-control" placeholder="Saisir l'objectif ici ..."
                        name={{i}}{{objectif.designation}} (change)="addNew(objectif)" [(ngModel)]="objectif.designation">

                    </textarea>

                        <button style="float:right" mat-icon-button color="warn" *ngIf="newObjectifList?.length > 1"
                            (click)="deleteRow(i)">
                            <span class="material-icons">delete</span>
                        </button>
                        <button style="float:right" mat-icon-button color="primary" (click)="addNewRow()">
                            <span class="material-icons">add</span>
                        </button>
                        <br>
                    </div>
                </div>
            </div>
    </div>

</form>
</ng-template>

<div>
        <button mat-button matStepperPrevious>Back</button>
        <button mat-button matStepperNext (click)="onSubmit()">Next</button>
      </div>
