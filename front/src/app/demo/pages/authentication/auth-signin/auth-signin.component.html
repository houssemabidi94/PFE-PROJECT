<div class="auth-wrapper">
  <div class="auth-content">
    <div class="auth-bg">
      <span class="r"></span>
      <span class="r s"></span>
      <span class="r s"></span>
      <span class="r"></span>
    </div>
    <div class="card">
      <div class="card-body text-center">
        <div class="mb-4">
          <img src="../../../../../assets/images/logo-thumb.png" width="150px" height="150px">
        </div>
        <form #form="ngForm" class="form-container" (ngSubmit)="onSubmit(form.invalid)">
        <h3 class="mb-4">Login</h3>
        <div class="input-group mb-3">
          <input type="email" class="form-control" placeholder="Email"  #email="ngModel" 
          [(ngModel)]="user.email" name="email">
        </div>
        <div class="input-group mb-4">
          <input type="password" class="form-control" placeholder="Password" #password="ngModel" 
          [(ngModel)]="user.password" name="password">
        </div>
        <button class="btn btn-primary mb-4">Login</button>
      </form>
      </div>
    </div>
  </div>
</div>
